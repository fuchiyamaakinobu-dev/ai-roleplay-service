<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ロープレ管理画面</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <header class="admin-header">
    <div>
      <p>AI接客ロープレ</p>
      <h1>シナリオ管理画面</h1>
    </div>
    <a href="./index.html">ロープレ画面へ戻る</a>
  </header>

  <main class="admin-shell">
    <section class="login-card" id="loginCard">
      <h2>管理者ログイン</h2>
      <p>登録済みのGoogleアカウントでログインしてください。</p>
      <button class="primary" id="loginButton" type="button">Googleでログイン</button>
      <p class="status" id="loginStatus"></p>
    </section>

    <section class="editor" id="editor" hidden>
      <aside class="editor-sidebar">
        <div class="user-card">
          <strong id="userName"></strong>
          <small id="userEmail"></small>
          <button class="link-button" id="logoutButton" type="button">ログアウト</button>
        </div>

        <div class="side-heading">
          <h2>シナリオ</h2>
          <button id="duplicateButton" type="button">複製</button>
        </div>
        <div id="scenarioButtons" class="scenario-buttons"></div>
      </aside>

      <section class="editor-main">
        <div class="toolbar">
          <div>
            <strong id="saveState">未保存</strong>
            <small id="updatedAt"></small>
          </div>
          <div class="toolbar-actions">
            <button id="reloadButton" type="button">再読込</button>
            <button id="saveDraftButton" type="button">下書き保存</button>
            <button class="primary" id="publishButton" type="button">公開する</button>
          </div>
        </div>

        <div class="notice">
          「下書き保存」は公開画面に反映されません。「公開する」を押すと全端末のロープレに反映されます。
        </div>

        <form id="scenarioForm" class="scenario-form"></form>

        <details class="json-panel">
          <summary>詳細データ（上級者向け）</summary>
          <p>通常は上の入力欄を使ってください。JSONを直接編集する場合は、反映ボタンを押してから保存します。</p>
          <textarea id="jsonEditor" rows="18" spellcheck="false"></textarea>
          <button id="applyJsonButton" type="button">詳細データを反映</button>
        </details>
      </section>
    </section>
  </main>

  <script src="./scenario.js"></script>
  <script type="module" src="./admin.js"></script>
</body>
</html>
